---
name: PR Playground Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: playground-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  playground-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build blueprint from repo template
        id: blueprint
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const blueprint = JSON.parse(fs.readFileSync('blueprint.json', 'utf8'));

            const headRepo = context.payload.pull_request.head.repo.full_name;
            const branch = context.payload.pull_request.head.ref;
            const pluginUrl = `https://github.com/${headRepo}/archive/refs/heads/${branch}.zip`;

            for (const step of blueprint.steps) {
              if (step.step === 'installMoodlePlugin' && step.pluginName === 'exeweb') {
                step.url = pluginUrl;
              }
            }

            return JSON.stringify(blueprint);
          result-encoding: string

      - name: Post Moodle Playground preview
        uses: ateeducacion/action-moodle-playground-pr-preview@main
        with:
          mode: comment
          blueprint: ${{ steps.blueprint.outputs.result }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
